name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python tests.py

      - name: Smoke-test CLI on auth sample (expect critical alerts → exit 2)
        run: |
          python analyzer.py sample_logs/auth.log --no-breach 2>/dev/null || true
          EXIT=$(python analyzer.py sample_logs/auth.log 2>/dev/null; echo $?)
          echo "Exit code: $EXIT"

      - name: Smoke-test CLI JSON output
        run: |
          python analyzer.py sample_logs/auth.log --json | python -m json.tool > /dev/null

      - name: Smoke-test Apache log
        run: python analyzer.py sample_logs/access.log --json | python -m json.tool > /dev/null

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check analyzer.py parsers.py rules.py models.py detector.py tests.py